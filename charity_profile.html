<!-- charity_profile.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HelpHub - Charity Profile</title>
</head>
<body>
  <header>
    <h1>HelpHub</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="charities.html">Charities</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section>
      <img src="charity1.jpg" alt="Charity Name" />
      <h2>Charity One</h2>
      <p>Mission: Providing essential resources to underserved communities.</p>
      <p>Location: New York, NY</p>
      <p>Website: <a href="#">www.charityone.org</a></p>
    </section>

    <section>
      <h3>Contact this Charity</h3>
      <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message:</label>
        <textarea id="message" name="message" required></textarea>

        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 HelpHub</p>
  </footer>
</body>
</html>
